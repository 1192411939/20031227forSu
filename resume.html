<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>孙嘉纬 | 简历预览</title>
    <style>
      :root { color-scheme: light; --bg:#f7f5ee; --ink:#141412; --line:rgba(20,20,18,.14); --accent:#c8ff2f; }
      * { box-sizing: border-box; }
      html, body { margin:0; min-height:100%; background:var(--bg) !important; color:var(--ink); font-family:"Microsoft YaHei UI","Microsoft YaHei",sans-serif; }
      body::before { content:""; position:fixed; inset:0; pointer-events:none; background:linear-gradient(90deg, rgba(20,20,18,.045) 1px, transparent 1px) 0 0 / 72px 100%, radial-gradient(circle at 86% 4%, rgba(200,255,47,.22), transparent 360px); }
      header { position:sticky; top:0; z-index:10; display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid var(--line); background:rgba(247,245,238,.88); backdrop-filter:blur(16px); }
      h1 { margin:0; font-family:"Times New Roman","Songti SC",serif; font-weight:400; font-size:22px; }
      .actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
      a { color:inherit; }
      .button { min-height:34px; display:inline-flex; align-items:center; justify-content:center; padding:0 12px; border:1px solid var(--ink); border-radius:999px; text-decoration:none; font-size:13px; background:rgba(255,255,255,.34); }
      .button.download { background:var(--accent); }
      main { position:relative; width:min(980px, 100%); margin:0 auto; padding:22px 16px 42px; }
      .paper { width:100%; display:block; border:1px solid var(--line); background:#fff; box-shadow:0 18px 70px rgba(20,20,18,.14); }
      @media (prefers-color-scheme: dark) { html, body { background:var(--bg) !important; color:var(--ink) !important; } header { background:rgba(247,245,238,.9) !important; } }
      @media (max-width: 560px) { header { align-items:flex-start; } h1 { font-size:18px; } .button { font-size:12px; padding:0 10px; } main { padding:14px 10px 34px; } }
    </style>
  </head>
  <body>
    <header>
      <h1>简历预览</h1>
      <nav class="actions" aria-label="简历操作">
        <a class="button" href="index.html">返回作品集</a>
        <a class="button download" href="assets/docs/jianli.pdf" download>下载 PDF</a>
      </nav>
    </header>
    <main>
      <img class="paper" src="assets/docs/preview/jianli-page-1.png" alt="孙嘉纬简历预览" />
    </main>
  </body>
</html>
